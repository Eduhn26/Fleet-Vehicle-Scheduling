services:
  backend:
    build: ./backend
    container_name: fleet-backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    environment:
      ANALYTICS_SERVICE_URL: http://host.docker.internal:8000
      ANALYTICS_SERVICE_TIMEOUT_MS: 5000
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: fleet-frontend
    ports:
      - "3000:3000"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - HOST=0.0.0.0
    depends_on:
      - backend
    restart: unless-stopped
