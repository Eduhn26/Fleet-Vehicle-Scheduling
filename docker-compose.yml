services:
  analytics-service:
    build:
      context: ./analytics-service
    container_name: fleet-analytics-service
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/ready', timeout=3)",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    container_name: fleet-backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    environment:
      ANALYTICS_SERVICE_URL: http://analytics-service:8000
      ANALYTICS_SERVICE_TIMEOUT_MS: 5000
    depends_on:
      analytics-service:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:5000/api/health').then((response) => { if (!response.ok) process.exit(1); }).catch(() => process.exit(1));",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: fleet-frontend
    ports:
      - "3000:3000"
    environment:
      CHOKIDAR_USEPOLLING: "true"
      HOST: 0.0.0.0
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
